<article class="card opportunity-card">
  <div class="card-top">
    <span class="pill">{{category}}</span>
    <span class="pill {{verifiedClass}}">{{verifiedText}}</span>
  </div>
  <h3><a href="{{detailUrl}}">{{title}}</a></h3>
  <p class="muted">{{province}} • {{sector}}</p>
  <p>{{summary}}</p>
  <div class="meta-row">
    <strong>Closing:</strong> {{closingDate}}
  </div>
  <a class="btn btn-secondary" href="{{detailUrl}}">View details</a>
</article>
