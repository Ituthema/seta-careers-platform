<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpportunitiesZA | Career Portal 2025/2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0d4a26; --primary-dark: #083318; --accent: #f59e0b; --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        nav { background: white; height: 70px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 800; color: var(--primary); }
        .logo span { color: var(--accent); }
        .hero { background: linear-gradient(135deg, var(--primary) 0%, #115e59 100%); padding: 60px 0; color: white; text-align: center; }
        .search-box { background: white; padding: 8px; border-radius: 16px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; max-width: 900px; margin: 20px auto; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .search-box input, .search-box select { border: 1px solid transparent; padding: 12px; border-radius: 10px; font-size: 14px; background: #f1f5f9; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; margin-top: 40px; margin-bottom: 60px;}
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: all 0.3s; position: relative; display: flex; flex-direction: column; text-decoration: none; color: inherit;}
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow); }
        .card-tag { position: absolute; top: 20px; right: 24px; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; }
        .tag-learnership { background: #dcfce7; color: #166534; }
        .tag-bursary { background: #fef3c7; color: #92400e; }
        .tag-internship { background: #dbeafe; color: #1e40af; }
        .card-title { font-size: 17px; font-weight: 700; margin: 10px 0; line-height: 1.4; }
        .card-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; }
        .card-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); font-size: 12px; font-weight: 600; color: #b91c1c; }
        @media (max-width: 768px) { .search-box { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-content">
            <div class="logo">Opportunities<span>ZA</span></div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>2025 Career Opportunities</h1>
            <p>Verified Learnerships, Bursaries & Internships for South African Youth</p>
            <div class="search-box">
                <input type="text" id="keyword" placeholder="Search (e.g. Nursing, SASOL, Admin)">
                <select id="location">
                    <option value="">All Provinces</option>
                    <option value="Gauteng">Gauteng</option>
                    <option value="Western Cape">Western Cape</option>
                    <option value="KwaZulu-Natal">KwaZulu-Natal</option>
                    <option value="Nationwide">Nationwide</option>
                </select>
                <select id="type">
                    <option value="">All Types</option>
                    <option value="learnership">Learnerships</option>
                    <option value="bursary">Bursaries</option>
                    <option value="internship">Internships</option>
                </select>
                <button class="btn btn-accent" onclick="filterData()">Search</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="grid" id="opportunity-grid"></div>
    </main>

    <script>
        const opportunities = [
            { id: 1, title: "SAPS Trainee Program 2025/2026", cat: "learnership", prov: "Nationwide", stipend: "R7 000/month", close: "2025-08-15" },
            { id: 2, title: "Standard Bank Graduate Internship", cat: "internship", prov: "Gauteng", stipend: "R12 000/month", close: "2025-09-30" },
            { id: 3, title: "Vodacom Merit Bursary Scheme", cat: "bursary", prov: "Nationwide", stipend: "Full Cover", close: "2025-10-31" },
            { id: 4, title: "Sasol Maintenance Learnership", cat: "learnership", prov: "Mpumalanga", stipend: "R6 500/month", close: "2025-07-20" },
            { id: 5, title: "Western Cape Health Nursing Intake", cat: "learnership", prov: "Western Cape", stipend: "R5 000/month", close: "2025-08-01" },
            { id: 6, title: "Coca-Cola Sales & Admin Internship", cat: "internship", prov: "KwaZulu-Natal", stipend: "R8 500/month", close: "2025-11-15" },
            { id: 7, title: "Transnet Freight Rail Apprenticeship", cat: "learnership", prov: "Nationwide", stipend: "R7 200/month", close: "2025-08-30" },
            { id: 8, title: "Absa Data Analyst Internship", cat: "internship", prov: "Gauteng", stipend: "R15 000/month", close: "2025-10-10" },
            { id: 9, title: "NSFAS Funding Application 2026", cat: "bursary", prov: "Nationwide", stipend: "Full Funding", close: "2025-11-30" },
            { id: 10, title: "Clicks Pharmacy Assistant Learnership", cat: "learnership", prov: "Western Cape", stipend: "R4 800/month", close: "2025-12-05" },
            { id: 11, title: "Discovery Health Business Admin", cat: "internship", prov: "Gauteng", stipend: "R9 000/month", close: "2025-09-15" },
            { id: 12, title: "Anglo American Engineering Bursary", cat: "bursary", prov: "Limpopo", stipend: "Full Tuition", close: "2025-07-15" },
            { id: 13, title: "Shoprite Retail Management Trainee", cat: "learnership", prov: "Nationwide", stipend: "R5 500/month", close: "2025-08-22" },
            { id: 14, title: "Capitec Service Consultant Intake", cat: "internship", prov: "Nationwide", stipend: "R7 500/month", close: "2025-10-01" },
            { id: 15, title: "Eskom Technical Learnership 2026", cat: "learnership", prov: "Nationwide", stipend: "R6 800/month", close: "2025-09-05" },
            { id: 16, title: "Sanlam Actuarial Science Bursary", cat: "bursary", prov: "Western Cape", stipend: "Full Funding", close: "2025-08-30" },
            { id: 17, title: "MTN Marketing Internship", cat: "internship", prov: "Gauteng", stipend: "R10 500/month", close: "2025-11-20" },
            { id: 18, title: "Netcare Nursing Diploma 2026", cat: "learnership", prov: "Nationwide", stipend: "R5 200/month", close: "2025-09-12" },
            { id: 19, title: "Old Mutual Wealth Internship", cat: "internship", prov: "Western Cape", stipend: "R11 000/month", close: "2025-10-25" },
            { id: 20, title: "Woolworths Supply Chain Learnership", cat: "learnership", prov: "KwaZulu-Natal", stipend: "R6 000/month", close: "2025-08-18" }
        ];

        function renderGrid(data) {
            const grid = document.getElementById('opportunity-grid');
            grid.innerHTML = data.length > 0 ? data.map(o => `
                <a href="#" class="card">
                    <span class="card-tag tag-${o.cat}">${o.cat}</span>
                    <h3 class="card-title">${o.title}</h3>
                    <div class="card-meta">📍 ${o.prov} • 💰 ${o.stipend}</div>
                    <div class="card-footer">⌛ Closes: ${o.close}</div>
                </a>
            `).join('') : '<p style="grid-column: 1/-1; text-align: center; padding: 40px;">No opportunities found. Try different filters.</p>';
        }

        function filterData() {
            const keyword = document.getElementById('keyword').value.toLowerCase();
            const location = document.getElementById('location').value;
            const type = document.getElementById('type').value;
            const filtered = opportunities.filter(o => 
                (o.title.toLowerCase().includes(keyword)) &&
                (location === "" || o.prov === location || o.prov === "Nationwide") &&
                (type === "" || o.cat === type)
            );
            renderGrid(filtered);
        }

        renderGrid(opportunities);
    </script>
</body>
</html>
